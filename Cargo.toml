[package]
name = "remarkable-tablet-cli-rs"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "remarkable-cli"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
uuid = { version = "1", features = ["v4"] }
toml = "0.8"
